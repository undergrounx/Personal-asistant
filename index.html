<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tanya Aja</title>
<style>
  :root{
    --ink:#141311;
    --paper:#f7f4ee;
    --line:#2a2822;
    --accent:#5b7a63;   /* sage, bukan terracotta */
    --accent-soft:#e4ead9;
    --muted:#8a8578;
    --bubble-user:#141311;
    --bubble-user-text:#f7f4ee;
    --bubble-bot:#ffffff;
    --bubble-bot-text:#141311;
    --radius:14px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background:var(--paper);
    color:var(--ink);
    font-family: "Iowan Old Style","Palatino Linotype", Georgia, serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .app{
    width:100%;
    max-width:560px;
    height:min(720px, 92vh);
    display:flex;
    flex-direction:column;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }

  header{
    padding:20px 22px 16px;
    border-bottom:1px solid rgba(20,19,17,0.1);
    display:flex;
    flex-direction:column;
    gap:4px;
  }

  .eyebrow{
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
  }

  h1{
    font-size:22px;
    font-weight:600;
    letter-spacing:-0.01em;
  }

  .status{
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size:11px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    margin-top:2px;
  }

  .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    flex-shrink:0;
  }

  #log{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .row{ display:flex; }
  .row.user{ justify-content:flex-end; }
  .row.bot{ justify-content:flex-start; }

  .bubble{
    max-width:78%;
    padding:11px 15px;
    border-radius:var(--radius);
    font-size:15px;
    line-height:1.5;
    white-space:pre-wrap;
    word-wrap:break-word;
  }

  .row.user .bubble{
    background:var(--bubble-user);
    color:var(--bubble-user-text);
    border-bottom-right-radius:4px;
  }

  .row.bot .bubble{
    background:var(--bubble-bot);
    color:var(--bubble-bot-text);
    border:1px solid rgba(20,19,17,0.08);
    border-bottom-left-radius:4px;
  }

  .row.bot .bubble.thinking{
    color:var(--muted);
    font-style:italic;
  }

  .row.bot .bubble.error{
    border-color:#b5533e;
    color:#8a3b28;
  }

  form{
    display:flex;
    gap:10px;
    padding:16px;
    border-top:1px solid rgba(20,19,17,0.1);
    background:var(--paper);
  }

  textarea{
    flex:1;
    resize:none;
    border:1px solid rgba(20,19,17,0.18);
    border-radius:12px;
    padding:11px 13px;
    font-family:inherit;
    font-size:15px;
    line-height:1.4;
    background:#fff;
    color:var(--ink);
    max-height:120px;
  }

  textarea:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }

  button{
    border:none;
    background:var(--ink);
    color:var(--paper);
    padding:0 20px;
    border-radius:12px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:opacity 0.15s ease;
  }

  button:hover{ opacity:0.85; }
  button:disabled{ opacity:0.4; cursor:not-allowed; }
  button:focus-visible, textarea:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  #log::-webkit-scrollbar{ width:8px; }
  #log::-webkit-scrollbar-thumb{ background:rgba(20,19,17,0.15); border-radius:8px; }

  @media (prefers-reduced-motion: no-preference){
    .bubble{ animation: rise 0.18s ease; }
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(4px); }
    to{ opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

  <div class="app">
    <header>
      <div class="eyebrow">Personal Assistant</div>
      <h1>Tanya Aja</h1>
      <div class="status"><span class="dot"></span><span id="statusText">siap menjawab</span></div>
    </header>

    <div id="log"></div>

    <form id="chatForm">
      <textarea id="input" placeholder="Ketik pesan..." rows="1" required></textarea>
      <button type="submit" id="sendBtn">Kirim</button>
    </form>
  </div>

<script>
  // ====== KONFIGURASI — GANTI INI ======
 const WEBHOOK_URL = "https://n8n-07udadxgevay.jkt6.sumopod.my.id/webhook/tanya-aja";
  // ======================================
  const log = document.getElementById("log");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const statusText = document.getElementById("statusText");

  // session id per browser, biar n8n bisa jaga histori percakapan per user
  function getSessionId(){
    let id = localStorage.getItem("tanyaaja_session");
    if(!id){
      id = "web-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("tanyaaja_session", id);
    }
    return id;
  }
  const sessionId = getSessionId();

  function addBubble(text, who){
    const row = document.createElement("div");
    row.className = "row " + who;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return bubble;
  }

  function autoGrow(){
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  }
  input.addEventListener("input", autoGrow);

  input.addEventListener("keydown", (e) => {
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      form.requestSubmit();
    }
  });

  addBubble("Halo, ada yang bisa dibantu?", "bot");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if(!message) return;

    addBubble(message, "user");
    input.value = "";
    autoGrow();

    input.disabled = true;
    sendBtn.disabled = true;
    statusText.textContent = "mengetik...";

    const thinkingBubble = addBubble("...", "bot");
    thinkingBubble.classList.add("thinking");

    try{
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message })
      });

      if(!res.ok){
        throw new Error("Server merespon dengan status " + res.status);
      }

      const data = await res.json();
      // dukung beberapa kemungkinan bentuk response dari n8n
      const reply =
        data.reply ??
        data.output ??
        data.text ??
        (typeof data === "string" ? data : null);

      thinkingBubble.classList.remove("thinking");
      thinkingBubble.textContent = reply || "Maaf, aku tidak dapat balasan yang jelas dari server.";

    }catch(err){
      thinkingBubble.classList.remove("thinking");
      thinkingBubble.classList.add("error");
      thinkingBubble.textContent = "Gagal terhubung ke server. Coba lagi sebentar lagi.";
      console.error(err);
    }finally{
      input.disabled = false;
      sendBtn.disabled = false;
      statusText.textContent = "siap menjawab";
      input.focus();
    }
  });
</script>

</body>
</html>
